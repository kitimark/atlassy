name: Release Plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install release-plz
        run: cargo install --locked release-plz

      - name: Validate GitHub App secrets
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -z "${APP_ID}" ]; then
            echo "Missing required Actions secret: APP_ID" >&2
            exit 1
          fi
          if [ -z "${APP_PRIVATE_KEY}" ]; then
            echo "Missing required Actions secret: APP_PRIVATE_KEY" >&2
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create or update release PR
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: release-plz release-pr --git-token "${GITHUB_TOKEN}"

  release-plz-release:
    runs-on: ubuntu-latest
    needs: release-plz-pr
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install release-plz
        run: cargo install --locked release-plz

      - name: Validate GitHub App secrets
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -z "${APP_ID}" ]; then
            echo "Missing required Actions secret: APP_ID" >&2
            exit 1
          fi
          if [ -z "${APP_PRIVATE_KEY}" ]; then
            echo "Missing required Actions secret: APP_PRIVATE_KEY" >&2
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Create release and tag
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: release-plz release --git-token "${GITHUB_TOKEN}"
