name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build atlassy-cli
        run: cargo build -p atlassy-cli --release --target "${{ matrix.target }}"

      - name: Package tarball
        id: package
        run: |
          tag="${GITHUB_REF_NAME}"
          archive="atlassy-cli-${tag}-${{ matrix.target }}.tar.gz"

          mkdir -p dist
          cp "target/${{ matrix.target }}/release/atlassy-cli" "dist/atlassy-cli"
          cp LICENSE "dist/LICENSE"

          tar -C dist -czf "${archive}" atlassy-cli LICENSE
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload tarball to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ steps.package.outputs.archive }}" --clobber

  checksums:
    name: Checksums
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download tarballs from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ github.ref_name }}" --pattern "atlassy-cli-${{ github.ref_name }}-*.tar.gz" --dir dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          shasum -a 256 atlassy-cli-${{ github.ref_name }}-*.tar.gz > checksums.txt

      - name: Upload checksums to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist/checksums.txt --clobber
